<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHJ-NOTA v4.0 | Cyberpunk HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
        }

        body {
            background-color: #050005;
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Efek Scanline */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, .2) 50%
            );
            background-size: 100% 3px;
        }

        /* Latar Belakang Grid */
        .cyber-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -10;
            opacity: 0.15;
            background-image: linear-gradient(#330033 1px, transparent 1px), linear-gradient(90deg, #330033 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Efek Glitch */
        .glitch-text {
            position: relative;
            color: white;
            font-style: italic;
        }

        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            left: 1px;
            text-shadow: -1px 0 var(--neon-pink);
            top: 0;
            color: white;
            background: transparent;
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: noise-anim 2s infinite linear alternate-reverse;
        }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 50px, 0); }
            20% { clip: rect(30px, 9999px, 20px, 0); }
            40% { clip: rect(60px, 9999px, 80px, 0); }
            60% { clip: rect(10px, 9999px, 40px, 0); }
            80% { clip: rect(80px, 9999px, 10px, 0); }
            100% { clip: rect(40px, 9999px, 30px, 0); }
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .animate-scan-fast {
            animation: scan 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 2px; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .shadow-neon-pink { box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }
        .shadow-neon-cyan { box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }

        /* Mobile Tab Specific */
        .tab-active {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        @media (max-width: 768px) {
            .mobile-height-limit {
                max-height: calc(100vh - 450px);
            }
        }
    </style>
</head>
<body class="selection:bg-[#ff00ff]/30">

    <div class="scanlines"></div>
    <div class="cyber-grid"></div>

    <!-- MAIN CONTAINER -->
    <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col">
        <div class="max-w-5xl mx-auto w-full p-2 sm:p-4 md:p-8 space-y-3 sm:space-y-6">
            
            <!-- HEADER HUD -->
            <header class="relative border-2 border-[#ff00ff] bg-black/80 p-3 sm:p-6 shadow-neon-pink overflow-hidden">
                <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-[#00ffff]"></div>
                <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#00ffff]"></div>
                <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#00ffff]"></div>
                <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-[#00ffff]"></div>

                <div class="flex flex-col sm:flex-row justify-between items-center gap-3">
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <div class="p-2 border border-[#00ffff] shadow-neon-cyan animate-pulse">
                            <i data-lucide="terminal" class="w-5 h-5 sm:w-8 sm:h-8"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h1 class="text-lg sm:text-3xl font-extrabold tracking-widest text-white italic glitch-text truncate" data-text="FHJ-NOTA">
                                FHJ-NOTA <span class="text-[#ff00ff]">v4.0</span>
                            </h1>
                            <p class="text-[7px] sm:text-[10px] text-[#00ffff]/60 font-bold uppercase tracking-[0.2em] flex items-center gap-2">
                                <i data-lucide="activity" class="w-2.5 h-2.5 text-[#ff00ff]"></i> 
                                <span id="clock">00:00:00</span> // INV:<span id="itemCountHeader">0</span>
                            </p>
                        </div>
                    </div>

                    <div class="flex gap-2 w-full sm:w-auto">
                        <button id="btnResetAll" class="flex-1 sm:flex-none px-2 py-1 border border-red-500/50 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all text-[8px] font-black uppercase tracking-widest flex items-center justify-center gap-1">
                            <i data-lucide="refresh-cw" class="w-2.5 h-2.5"></i> RESET
                        </button>
                        <div class="px-3 py-1 border border-[#ff00ff]/30 bg-[#ff00ff]/5 flex-1 text-center">
                            <div class="flex items-center justify-center gap-1 text-[#ff00ff] text-[8px] font-black italic">
                               <i data-lucide="shield-check" class="w-2.5 h-2.5"></i> SECURE_NODE
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- MOBILE TABS NAVIGATION -->
            <div class="flex sm:hidden border-b border-[#00ffff]/20">
                <button id="tabInput" class="flex-1 py-2 text-[10px] font-black tracking-widest uppercase tab-active border-r border-[#00ffff]/20">
                    TERMINAL_IN
                </button>
                <button id="tabView" class="flex-1 py-2 text-[10px] font-black tracking-widest uppercase">
                    LEDGER_OUT
                </button>
            </div>

            <!-- MAIN CONTENT AREA -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
                
                <!-- INPUT COLUMN (Hidden on mobile LEDGER tab) -->
                <div id="inputCol" class="lg:col-span-5 space-y-4 block">
                    <!-- Customer Identification -->
                    <div class="bg-black/60 border border-[#00ffff]/40 p-4 relative">
                        <div class="absolute -top-2 left-4 bg-black px-2 text-[8px] font-black text-[#00ffff] uppercase italic tracking-widest">
                            {">"} TARGET_ID
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <div class="col-span-2 sm:col-span-1">
                                <label class="text-[7px] font-bold text-[#ff00ff] uppercase mb-1 block">Pelanggan</label>
                                <input id="customerName" type="text" placeholder="NAME..." class="w-full bg-[#111] border border-[#00ffff]/20 p-2 outline-none focus:border-[#ff00ff] text-white font-bold text-xs uppercase">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="text-[7px] font-bold text-[#ff00ff] uppercase mb-1 block">WhatsApp</label>
                                <div class="flex items-center bg-[#111] border border-[#00ffff]/20 focus-within:border-[#ff00ff]">
                                    <span class="px-2 text-[#00ffff] font-black text-xs">+</span>
                                    <input id="phone" type="text" placeholder="628..." class="w-full bg-transparent p-2 pl-0 outline-none text-white font-bold text-xs">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Add Item Terminal -->
                    <div class="bg-black/60 border-2 border-[#00ffff] p-4 relative shadow-[0_0_10px_rgba(0,255,255,0.1)]">
                        <div class="absolute -top-3 left-4 bg-[#00ffff] px-2 py-0.5 text-[7px] font-black text-black uppercase italic flex items-center gap-1">
                            <i data-lucide="zap" class="w-2 h-2 fill-current"></i> ADD_ENTRY
                        </div>
                        
                        <form id="itemForm" class="space-y-3 mt-1">
                            <input id="itemName" type="text" placeholder="NAMA BARANG..." class="w-full bg-black border border-[#00ffff]/30 p-2 focus:ring-1 focus:ring-[#ff00ff] outline-none text-[#ff00ff] font-black uppercase text-xs">
                            <div class="flex gap-2">
                                <input id="itemQty" type="number" placeholder="QTY" value="1" class="w-16 bg-black border border-[#00ffff]/30 p-2 text-center outline-none text-white font-black text-xs">
                                <input id="itemPrice" type="number" placeholder="HARGA..." class="flex-1 bg-black border border-[#00ffff]/30 p-2 outline-none text-white font-black text-xs">
                                <button type="submit" class="bg-[#00ffff] text-black px-4 hover:bg-[#ff00ff] hover:text-white transition-all shadow-neon-cyan">
                                    <i data-lucide="plus" stroke-width="4" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Payment Terminal -->
                    <div class="bg-black/60 border border-[#ff00ff]/30 p-4 relative">
                        <div class="absolute -top-2 left-4 bg-black px-2 text-[8px] font-black text-[#ff00ff] uppercase italic tracking-widest">
                            {">"} CREDIT_IN
                        </div>
                        <form id="dpForm" class="relative pt-1 flex gap-2">
                            <div class="flex-1 relative">
                                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[#ff00ff] text-[10px] font-bold">Rp</span>
                                <input id="dpValue" type="number" placeholder="PAYMENT..." class="w-full bg-[#111] border border-[#ff00ff]/20 p-2 pl-7 outline-none focus:border-[#00ffff] text-[#00ffff] font-black text-xs">
                            </div>
                            <button type="submit" class="bg-[#ff00ff]/20 border border-[#ff00ff]/50 text-[#ff00ff] px-3 hover:bg-[#ff00ff] hover:text-white transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                        </form>
                        <div id="dpList" class="flex flex-wrap gap-2 mt-2 max-h-[60px] overflow-y-auto custom-scrollbar">
                            <!-- DP items horizontal -->
                        </div>
                    </div>
                </div>

                <!-- VIEW COLUMN (Hidden on mobile INPUT tab) -->
                <div id="viewCol" class="lg:col-span-7 space-y-4 hidden sm:block">
                    <!-- Ledger Registry -->
                    <div class="border border-[#00ffff]/20 bg-black/40 p-3">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="shopping-bag" class="text-[#ff00ff] w-3 h-3"></i>
                            <span class="text-[8px] font-black uppercase tracking-[0.2em] text-white">LEDGER_OUTPUT</span>
                            <div class="flex-1 border-t border-dashed border-[#00ffff]/20 mx-2"></div>
                        </div>

                        <div id="itemList" class="space-y-1.5 overflow-y-auto pr-1 custom-scrollbar mobile-height-limit lg:max-h-[500px]">
                            <div class="py-12 flex flex-col items-center justify-center opacity-20">
                                <i data-lucide="cpu" class="w-8 h-8 animate-spin-slow"></i>
                                <p class="mt-2 text-[7px] font-black uppercase">Buffer Empty</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- STICKY SUMMARY HUD -->
    <div class="bg-black border-t-2 border-[#ff00ff] p-3 sm:p-4 shadow-[0_-5px_20px_rgba(255,0,255,0.2)] z-40 relative">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row gap-3 items-center justify-between">
            <div class="flex justify-between w-full sm:w-auto sm:gap-10">
                <div class="flex flex-col">
                    <span class="text-[7px] font-black text-white/40 uppercase">VAL_INV</span>
                    <div id="totalTagihan" class="text-xs sm:text-lg font-black text-white italic">Rp0</div>
                </div>
                <div class="flex flex-col text-right sm:text-left">
                    <span class="text-[7px] font-black text-[#00ffff] uppercase">CRED_SYNC</span>
                    <div id="totalDp" class="text-xs sm:text-lg font-black text-[#00ffff] italic">Rp0</div>
                </div>
                <div id="statusBadge" class="hidden sm:flex px-3 py-1 border-2 font-black uppercase text-[8px] tracking-widest items-center gap-2 bg-[#ff00ff]/10 border-[#ff00ff] text-[#ff00ff]">
                    <span>STATUS_PENDING</span>
                </div>
            </div>

            <div id="statusBadgeMobile" class="sm:hidden w-full px-3 py-1 border-2 font-black uppercase text-[8px] tracking-tighter flex items-center justify-center gap-2 bg-[#ff00ff]/10 border-[#ff00ff] text-[#ff00ff]">
                <span>STATUS_PENDING</span>
            </div>

            <button id="btnWA" class="w-full sm:w-64 py-3 flex items-center justify-center gap-2 font-black text-xs transition-all relative group overflow-hidden bg-zinc-900 text-zinc-700 border border-zinc-800 disabled:grayscale" disabled>
                <div class="relative z-10 flex items-center gap-2 uppercase tracking-[0.2em]">
                    TRANSMIT_DATA <i data-lucide="send" class="w-4 h-4"></i>
                </div>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-[#ff00ff]/30 to-transparent -translate-x-full group-hover:animate-scan-fast pointer-events-none"></div>
            </button>
        </div>
    </div>

    <script>
        // State
        let items = [];
        let dpList = [];
        let editingId = null;
        let currentTab = 'input'; // 'input' or 'view'

        // Elements
        const customerNameInput = document.getElementById('customerName');
        const phoneInput = document.getElementById('phone');
        const itemForm = document.getElementById('itemForm');
        const dpForm = document.getElementById('dpForm');
        const itemListContainer = document.getElementById('itemList');
        const dpListContainer = document.getElementById('dpList');
        const totalTagihanEl = document.getElementById('totalTagihan');
        const totalDpEl = document.getElementById('totalDp');
        const grandTotalEl = document.getElementById('totalTagihan'); // Shared for total
        const statusBadge = document.getElementById('statusBadge');
        const statusBadgeMobile = document.getElementById('statusBadgeMobile');
        const btnWA = document.getElementById('btnWA');
        const btnResetAll = document.getElementById('btnResetAll');
        const itemCountHeader = document.getElementById('itemCountHeader');
        const clockEl = document.getElementById('clock');
        
        // Tab Elements
        const tabInput = document.getElementById('tabInput');
        const tabView = document.getElementById('tabView');
        const inputCol = document.getElementById('inputCol');
        const viewCol = document.getElementById('viewCol');

        // Clock Update
        function updateClock() {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Mobile Tab Controller
        function setTab(tab) {
            currentTab = tab;
            if (tab === 'input') {
                tabInput.classList.add('tab-active');
                tabView.classList.remove('tab-active');
                inputCol.classList.remove('hidden');
                viewCol.classList.add('hidden');
            } else {
                tabInput.classList.remove('tab-active');
                tabView.classList.add('tab-active');
                inputCol.classList.add('hidden');
                viewCol.classList.remove('hidden');
            }
        }
        tabInput.onclick = () => setTab('input');
        tabView.onclick = () => setTab('view');

        // Render Functions
        function renderItems() {
            if (items.length === 0) {
                itemListContainer.innerHTML = `
                    <div class="py-12 flex flex-col items-center justify-center opacity-20 border border-dashed border-[#00ffff]/20">
                        <i data-lucide="cpu" class="w-8 h-8 animate-spin-slow"></i>
                        <p class="mt-4 text-[7px] font-black uppercase">Buffer Empty</p>
                    </div>
                `;
            } else {
                itemListContainer.innerHTML = items.map((item, index) => {
                    if (editingId === item.id) {
                        return `
                        <div class="flex flex-col gap-2 bg-black/90 border border-[#ff00ff] p-2 relative shadow-neon-pink">
                            <input id="editName-${item.id}" type="text" value="${item.name}" class="w-full bg-[#111] border border-[#ff00ff]/30 p-1.5 text-white font-black uppercase text-[10px] outline-none">
                            <div class="flex gap-1">
                                <input id="editQty-${item.id}" type="number" value="${item.qty}" class="w-12 bg-[#111] border border-[#ff00ff]/30 p-1.5 text-white font-black text-center text-[10px] outline-none">
                                <input id="editPrice-${item.id}" type="number" value="${item.price}" class="flex-1 bg-[#111] border border-[#ff00ff]/30 p-1.5 text-white font-black text-[10px] outline-none">
                                <button onclick="saveEdit(${item.id})" class="bg-[#ff00ff] text-white px-2">OK</button>
                                <button onclick="setEditing(null)" class="bg-zinc-800 text-white px-2">X</button>
                            </div>
                        </div>
                        `;
                    }
                    return `
                    <div class="group flex items-center gap-2 bg-black/60 border border-[#00ffff]/10 p-2 relative hover:border-[#ff00ff] transition-all">
                        <div class="text-[7px] font-black text-[#00ffff]/40 w-3">${String(items.length - index).padStart(2, '0')}</div>
                        <div class="flex-1 min-w-0">
                            <div class="text-[10px] font-black text-white truncate uppercase">${item.name}</div>
                            <div class="flex items-center gap-2 text-[8px] font-black text-[#00ffff]/60 uppercase">
                                <span>${item.qty}U</span>
                                <span>@${item.price.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="text-right flex items-center gap-2">
                            <div class="text-[10px] font-black text-[#ff00ff] italic">Rp${(item.qty * item.price).toLocaleString()}</div>
                            <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="setEditing(${item.id})" class="text-[#00ffff] p-1"><i data-lucide="edit-2" class="w-2.5 h-2.5"></i></button>
                                <button onclick="removeItem(${item.id})" class="text-red-500/50 p-1"><i data-lucide="trash-2" class="w-2.5 h-2.5"></i></button>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            }
            lucide.createIcons();
            updateCalculations();
        }

        function renderDp() {
            if (dpList.length === 0) {
                dpListContainer.innerHTML = '<span class="text-[7px] text-slate-700 italic">No Credits</span>';
                updateCalculations();
                return;
            }
            dpListContainer.innerHTML = dpList.map(dp => `
                <div class="flex items-center gap-1 bg-[#00ffff]/5 p-1 border border-[#00ffff]/20 rounded">
                    <span class="text-[8px] font-black text-white">Rp${dp.amount.toLocaleString()}</span>
                    <button onclick="removeDp(${dp.id})" class="text-red-500/50 hover:text-red-500"><i data-lucide="x" class="w-2 h-2"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
            updateCalculations();
        }

        function updateCalculations() {
            const subtotal = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
            const totalDp = dpList.reduce((sum, dp) => sum + dp.amount, 0);
            const selisih = totalDp - subtotal;

            totalTagihanEl.textContent = `Rp${subtotal.toLocaleString()}`;
            totalDpEl.textContent = `Rp${totalDp.toLocaleString()}`;
            itemCountHeader.textContent = items.length;

            const updateStatus = (badge) => {
                if (subtotal === 0) {
                    badge.className = "flex px-3 py-1 border-2 font-black uppercase text-[8px] tracking-widest items-center gap-2 bg-[#ff00ff]/10 border-[#ff00ff] text-[#ff00ff]";
                    badge.innerHTML = `<span>WAITING_INPUT</span>`;
                    btnWA.disabled = true;
                    btnWA.classList.add('grayscale');
                } else if (selisih < 0) {
                    badge.className = "flex px-3 py-1 border-2 font-black uppercase text-[8px] tracking-widest items-center gap-2 bg-red-500/10 border-red-500 text-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]";
                    badge.innerHTML = `<i data-lucide="coins" class="w-3 h-3"></i><span>SISA: Rp${Math.abs(selisih).toLocaleString()}</span>`;
                    btnWA.disabled = false;
                    btnWA.classList.remove('grayscale');
                    btnWA.className = "w-full sm:w-64 py-3 flex items-center justify-center gap-2 font-black text-xs transition-all relative group bg-white text-black shadow-white/20";
                } else if (selisih > 0) {
                    badge.className = "flex px-3 py-1 border-2 font-black uppercase text-[8px] tracking-widest items-center gap-2 bg-emerald-500/10 border-emerald-500 text-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.3)]";
                    badge.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3"></i><span>KEMBALI: Rp${selisih.toLocaleString()}</span>`;
                    btnWA.disabled = false;
                    btnWA.classList.remove('grayscale');
                    btnWA.className = "w-full sm:w-64 py-3 flex items-center justify-center gap-2 font-black text-xs transition-all relative group bg-white text-black shadow-white/20";
                } else {
                    badge.className = "flex px-3 py-1 border-2 font-black uppercase text-[8px] tracking-widest items-center gap-2 bg-[#00ffff]/10 border-[#00ffff] text-[#00ffff] shadow-[0_0_10px_rgba(0,255,255,0.3)]";
                    badge.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3"></i><span>SETTLED_LUNAS</span>`;
                    btnWA.disabled = false;
                    btnWA.classList.remove('grayscale');
                    btnWA.className = "w-full sm:w-64 py-3 flex items-center justify-center gap-2 font-black text-xs transition-all relative group bg-white text-black shadow-white/20";
                }
            };

            updateStatus(statusBadge);
            updateStatus(statusBadgeMobile);
            lucide.createIcons();
        }

        // Action Handlers
        itemForm.onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;
            const price = document.getElementById('itemPrice').value;

            if (!name || !price) return;

            items.unshift({
                id: Date.now(),
                name: name.toUpperCase(),
                qty: parseInt(qty) || 1,
                price: parseInt(price) || 0
            });

            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('itemQty').value = '1';
            document.getElementById('itemName').focus();
            renderItems();
        };

        dpForm.onsubmit = (e) => {
            e.preventDefault();
            const value = document.getElementById('dpValue').value;
            if (!value) return;

            dpList.push({
                id: Date.now(),
                amount: parseInt(value)
            });

            document.getElementById('dpValue').value = '';
            renderDp();
        };

        window.removeItem = (id) => {
            items = items.filter(item => item.id !== id);
            renderItems();
        };

        window.removeDp = (id) => {
            dpList = dpList.filter(dp => dp.id !== id);
            renderDp();
        };

        window.setEditing = (id) => {
            editingId = id;
            renderItems();
            if(id) {
                setTimeout(() => document.getElementById(`editName-${id}`).focus(), 10);
            }
        };

        window.saveEdit = (id) => {
            const newName = document.getElementById(`editName-${id}`).value;
            const newQty = document.getElementById(`editQty-${id}`).value;
            const newPrice = document.getElementById(`editPrice-${id}`).value;

            items = items.map(item => {
                if (item.id === id) {
                    return {
                        ...item,
                        name: newName.toUpperCase(),
                        qty: parseInt(newQty) || 0,
                        price: parseInt(newPrice) || 0
                    };
                }
                return item;
            });

            editingId = null;
            renderItems();
        };

        btnResetAll.onclick = () => {
            if (confirm("KONFIRMASI: Hapus seluruh data sistem?")) {
                items = [];
                dpList = [];
                editingId = null;
                customerNameInput.value = '';
                phoneInput.value = '';
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemQty').value = '1';
                document.getElementById('dpValue').value = '';
                
                renderItems();
                renderDp();
                setTab('input');
                customerNameInput.focus();
            }
        };

        btnWA.onclick = () => {
            const rawName = customerNameInput.value.trim() || 'Customer';
            const formattedName = rawName.split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
                
            const subtotal = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
            const totalDp = dpList.reduce((sum, dp) => sum + dp.amount, 0);
            const selisih = totalDp - subtotal;
            
            let statusText = "Lunas";
            if (selisih < 0) statusText = `Sisa Tagihan: Rp${Math.abs(selisih).toLocaleString()}`;
            if (selisih > 0) statusText = `Lunas & Kembalian: Rp${selisih.toLocaleString()}`;

            let message = `List Lelangan *${formattedName}*\n`;
            items.forEach((item, index) => {
                message += `${index + 1}. ${item.name} (${item.qty}x) = ${item.qty * item.price}\n`;
            });
            message += `\ntotal tagihan = ${subtotal}\n`;
            message += `dp diterima = ${totalDp}\n`;
            message += `Status = ${statusText}`;

            const phone = phoneInput.value.replace(/[^0-9]/g, '');
            const waUrl = phone 
                ? `https://wa.me/${phone}?text=${encodeURIComponent(message)}`
                : `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
            
            window.open(waUrl, '_blank');
        };

        // Initialize Icons & UI
        lucide.createIcons();
        if (window.innerWidth <= 768) {
            setTab('input');
        }
    </script>
</body>
</html>
